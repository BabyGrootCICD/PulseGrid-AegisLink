version: '3.8'

services:
  # =============================================================================
  # Infrastructure Services
  # =============================================================================
  
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./database/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - backend

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: aurasync
      POSTGRES_PASSWORD: aurasync_dev
      POSTGRES_DB: aurasync
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/postgres/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/postgres/seeds/dev_seed.sql:/docker-entrypoint-initdb.d/02-seeds.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aurasync -d aurasync"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - backend

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: aurasync
      MONGO_INITDB_ROOT_PASSWORD: aurasync_dev
      MONGO_INITDB_DATABASE: aurasync
    volumes:
      - mongo_data:/data/db
      - ./database/mongodb/schemas:/docker-entrypoint-initdb.d
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - backend

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -i healthcheck -W 3 | grep -q . || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - backend

  # =============================================================================
  # Application Services
  # =============================================================================
  
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile.go
      args:
        SERVICE: api-gateway
    ports:
      - "8082:8082"
    environment:
      PORT: 8082
      REDIS_ADDR: redis:6379
      DATABASE_URL: postgresql://aurasync:aurasync_dev@postgres:5432/aurasync
      MONGODB_URI: mongodb://aurasync:aurasync_dev@mongodb:27017/aurasync
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - backend
      - frontend

  sfu-server:
    build:
      context: .
      dockerfile: Dockerfile.go
      args:
        SERVICE: sfu-server
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      REDIS_ADDR: redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - backend
      - frontend

  mqtt-broker:
    build:
      context: .
      dockerfile: Dockerfile.go
      args:
        SERVICE: mqtt-broker
    ports:
      - "8081:8081"
    environment:
      PORT: 8081
      MQTT_BROKER: tcp://mosquitto:1883
      REDIS_ADDR: redis:6379
    depends_on:
      mosquitto:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - backend
      - frontend

  web-app:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://localhost:8082
      NEXT_PUBLIC_WS_URL: ws://localhost:8080
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - frontend

  # =============================================================================
  # Reverse Proxy
  # =============================================================================
  
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - api-gateway
      - sfu-server
      - mqtt-broker
      - web-app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - frontend

# =============================================================================
# Networks
# =============================================================================

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge

# =============================================================================
# Volumes
# =============================================================================

volumes:
  redis_data:
  postgres_data:
  mongo_data:
  mosquitto_data:
  mosquitto_log:
